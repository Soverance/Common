# Publishes NuGet packages to GitHub Packages when their source changes.
# Detects which packages changed and only publishes those.
# Auth changes also trigger a Data republish (dependency chain).
# Data changes also trigger SqlServer and Postgres republishes (companion packages).

name: Publish NuGet Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      auth_changed: ${{ steps.changes.outputs.auth_changed }}
      data_changed: ${{ steps.changes.outputs.data_changed }}
      forum_changed: ${{ steps.changes.outputs.forum_changed }}
      sqlserver_changed: ${{ steps.changes.outputs.sqlserver_changed }}
      postgres_changed: ${{ steps.changes.outputs.postgres_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          AUTH_CHANGED=false
          DATA_CHANGED=false
          FORUM_CHANGED=false
          SQLSERVER_CHANGED=false
          POSTGRES_CHANGED=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AUTH_CHANGED=true
            DATA_CHANGED=true
            FORUM_CHANGED=true
            SQLSERVER_CHANGED=true
            POSTGRES_CHANGED=true
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

            if echo "$CHANGED_FILES" | grep -q '^src/Soverance\.Auth/'; then
              AUTH_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -q '^src/Soverance\.Data/'; then
              DATA_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -q '^src/Soverance\.Forum/'; then
              FORUM_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -q '^src/Soverance\.Data\.SqlServer/'; then
              SQLSERVER_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -q '^src/Soverance\.Data\.Postgres/'; then
              POSTGRES_CHANGED=true
            fi

            # Dependency chain: Auth changes require Data republish
            if [ "$AUTH_CHANGED" = "true" ]; then
              DATA_CHANGED=true
            fi

            # Dependency chain: Data changes require SqlServer and Postgres republish
            if [ "$DATA_CHANGED" = "true" ]; then
              SQLSERVER_CHANGED=true
              POSTGRES_CHANGED=true
            fi
          fi

          echo "auth_changed=$AUTH_CHANGED" >> "$GITHUB_OUTPUT"
          echo "data_changed=$DATA_CHANGED" >> "$GITHUB_OUTPUT"
          echo "forum_changed=$FORUM_CHANGED" >> "$GITHUB_OUTPUT"
          echo "sqlserver_changed=$SQLSERVER_CHANGED" >> "$GITHUB_OUTPUT"
          echo "postgres_changed=$POSTGRES_CHANGED" >> "$GITHUB_OUTPUT"

          echo "Auth changed: $AUTH_CHANGED"
          echo "Data changed: $DATA_CHANGED"
          echo "Forum changed: $FORUM_CHANGED"
          echo "SqlServer changed: $SQLSERVER_CHANGED"
          echo "Postgres changed: $POSTGRES_CHANGED"

  publish-auth:
    name: Publish Soverance.Auth
    needs: detect-changes
    if: needs.detect-changes.outputs.auth_changed == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'auth/v*' --sort=-v:refname | head -n 1)
          LATEST_VERSION=""
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#auth/v}"
          fi

          DECLARED_VERSION=$(grep -oP '<Version>\K[^<]+' src/Soverance.Auth/Soverance.Auth.csproj | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="${DECLARED_VERSION:-1.0.0}"
          else
            HIGHER=$(printf '%s\n%s\n' "$LATEST_VERSION" "$DECLARED_VERSION" | sort -V | tail -n 1)
            if [ -n "$DECLARED_VERSION" ] && [ "$HIGHER" = "$DECLARED_VERSION" ] && [ "$DECLARED_VERSION" != "$LATEST_VERSION" ]; then
              VERSION="$DECLARED_VERSION"
            else
              MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
              MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
              PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Soverance.Auth v$VERSION"

      - name: Pack
        run: >
          dotnet pack src/Soverance.Auth/Soverance.Auth.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          --output ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/Soverance.Auth.*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

      - name: Create and push tag
        run: |
          git tag "auth/v${{ steps.version.outputs.version }}"
          git push origin "auth/v${{ steps.version.outputs.version }}"

  publish-data:
    name: Publish Soverance.Data
    needs: [detect-changes, publish-auth]
    if: |
      always() &&
      needs.detect-changes.outputs.data_changed == 'true' &&
      (needs.publish-auth.result == 'success' || needs.publish-auth.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag -l 'data/v*' --sort=-v:refname | head -n 1)
          LATEST_VERSION=""
          if [ -n "$LATEST_TAG" ]; then
            LATEST_VERSION="${LATEST_TAG#data/v}"
          fi

          DECLARED_VERSION=$(grep -oP '<Version>\K[^<]+' src/Soverance.Data/Soverance.Data.csproj | head -n 1)

          if [ -z "$LATEST_TAG" ]; then
            VERSION="${DECLARED_VERSION:-1.0.0}"
          else
            HIGHER=$(printf '%s\n%s\n' "$LATEST_VERSION" "$DECLARED_VERSION" | sort -V | tail -n 1)
            if [ -n "$DECLARED_VERSION" ] && [ "$HIGHER" = "$DECLARED_VERSION" ] && [ "$DECLARED_VERSION" != "$LATEST_VERSION" ]; then
              VERSION="$DECLARED_VERSION"
            else
              MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
              MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
              PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
              PATCH=$((PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing Soverance.Data v$VERSION"

      - name: Update Auth dependency version
        if: needs.publish-auth.outputs.version != ''
        run: |
          AUTH_VERSION=${{ needs.publish-auth.outputs.version }}
          sed -i "s|<PackageReference Include=\"Soverance.Auth\" Version=\"[^\"]*\"|<PackageReference Include=\"Soverance.Auth\" Version=\"$AUTH_VERSION\"|" \
            src/Soverance.Data/Soverance.Data.csproj

      - name: Wait for Auth package to be indexed on NuGet.org
        if: needs.publish-auth.outputs.version != ''
        run: |
          AUTH_VERSION=${{ needs.publish-auth.outputs.version }}
          echo "Waiting for Soverance.Auth v$AUTH_VERSION to appear on NuGet.org..."
          for i in $(seq 1 30); do
            if dotnet nuget list source | head -1 > /dev/null && \
               curl -sf "https://api.nuget.org/v3-flatcontainer/soverance.auth/${AUTH_VERSION}/soverance.auth.${AUTH_VERSION}.nupkg" -o /dev/null 2>&1; then
              echo "Package available after ~$((i * 10)) seconds"
              break
            fi
            echo "Attempt $i/30 - not yet available, waiting 10s..."
            sleep 10
          done

      - name: Pack
        run: >
          dotnet pack src/Soverance.Data/Soverance.Data.csproj
          --configuration Release
          -p:Version=${{ steps.version.outputs.version }}
          --output ./nupkg

      - name: Push to NuGet.org
        run: >
          dotnet nuget push ./nupkg/Soverance.Data.*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

      - name: Create and push tag
        run: |
          git tag "data/v${{ steps.version.outputs.version }}"
          git push origin "data/v${{ steps.version.outputs.version }}"

