# When Common's main branch is updated, open PRs in dependent repos
# to update their submodule pointer.
#
# Requires a PAT with repo scope stored as SUBMODULE_UPDATE_TOKEN
# (the default GITHUB_TOKEN can't trigger workflows in other repos).

name: Update Submodules

on:
  push:
    branches: [main]

jobs:
  update-submodules:
    name: Update ${{ matrix.repo }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - repo: Soverance/soverance.com
            submodule_path: lib/Common
            base_branch: master
          - repo: Soverance/Vanalytics
            submodule_path: src/lib/Common
            base_branch: main

    steps:
      - name: Checkout dependent repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repo }}
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
          submodules: recursive
          ref: ${{ matrix.base_branch }}

      - name: Update submodule pointer
        run: |
          cd ${{ matrix.submodule_path }}
          git fetch origin main
          git checkout ${{ github.sha }}
          cd $GITHUB_WORKSPACE

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SUBMODULE_UPDATE_TOKEN }}
          branch: chore/update-common-submodule
          delete-branch: true
          title: "chore: update Common submodule"
          body: |
            Automated PR to update the Common submodule pointer.

            Common commit: ${{ github.sha }}
            Triggered by: ${{ github.event.head_commit.message }}
          commit-message: "chore: update Common submodule to ${{ github.sha }}"
          base: ${{ matrix.base_branch }}
